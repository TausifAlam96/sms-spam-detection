{% extends 'layout.html' %} {% block content %}
<h2>Login</h2>
<form method="POST">
  <div>
    <label>Username:</label><br />
    <input type="text" name="username" required />
  </div>
  <br />
  <div>
    <label>Password:</label><br />
    <input type="password" name="password" required />
  </div>
  <br />
  <button type="submit">Login</button>
</form>
{% endblock %}
